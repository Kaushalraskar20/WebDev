<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Fashion E-Commerce</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f4f6f9;font-family:Poppins}
.card img{height:230px;object-fit:cover}
.dark{background:#0d1117;color:white}
.dark .card{background:#161b22;color:white}
.banner{background:#000;color:white;padding:40px;text-align:center}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="container text-center mt-5">
<h3>Login</h3>
<input id="username" class="form-control mb-2" placeholder="Username">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">
<button class="btn btn-dark w-100" onclick="login()">Login</button>
<p class="mt-2">admin / admin</p>
</div>

<!-- STORE -->
<div id="storePage" style="display:none">
<nav class="navbar bg-dark navbar-dark px-3">
<span>FashionStore ⭐</span>
<div>
<button class="btn btn-warning btn-sm" onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>
<button class="btn btn-secondary btn-sm" onclick="toggleTheme()">Theme</button>
<button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
</div>
</nav>

<div class="banner">
<h2>Real Fashion Collection</h2>
<p>Search • Filter • Real Images</p>
</div>

<div class="container mt-3">
<input id="search" class="form-control mb-3" placeholder="Search products...">
<div class="mb-2">
<button class="btn btn-outline-dark" onclick="filter('All')">All</button>
<button class="btn btn-outline-dark" onclick="filter('Men')">Men</button>
<button class="btn btn-outline-dark" onclick="filter('Women')">Women</button>
<button class="btn btn-outline-dark" onclick="filter('Shoes')">Shoes</button>
<button class="btn btn-outline-dark" onclick="filter('Accessories')">Accessories</button>
</div>
<div class="row" id="products"></div>
</div>
</div>

<!-- CART -->
<div class="modal fade" id="cartModal">
<div class="modal-dialog">
<div class="modal-content p-3">
<h4>Your Cart</h4>
<div id="cartItems"></div>
<h5>Total ₹<span id="total"></span></h5>
<button class="btn btn-success" onclick="checkout()">Checkout</button>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

/* REAL PRODUCT LIST */
let products=[
{id:1,name:"Men Jacket",price:1999,cat:"Men",img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
{id:2,name:"Men T-Shirt",price:899,cat:"Men",img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{id:3,name:"Jeans",price:1499,cat:"Men",img:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246"},
{id:4,name:"Sneakers",price:2699,cat:"Shoes",img:"https://images.unsplash.com/photo-1528701800489-20be3c2ea0de"},
{id:5,name:"Women Dress",price:2499,cat:"Women",img:"https://images.unsplash.com/photo-1495121605193-b116b5b09c6b"},
{id:6,name:"Handbag",price:1899,cat:"Accessories",img:"https://images.unsplash.com/photo-1548036328-c9fa89d128fa"},
{id:7,name:"Women Top",price:1199,cat:"Women",img:"https://images.unsplash.com/photo-1489987707025-afc232f7ea0f"},
{id:8,name:"Heels",price:1999,cat:"Shoes",img:"https://images.unsplash.com/photo-1528701800489-20be3c2ea0de"},
{id:9,name:"Watch",price:3599,cat:"Accessories",img:"https://images.unsplash.com/photo-1518546305927-5a555bb7020d"},
{id:10,name:"Sunglasses",price:999,cat:"Accessories",img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083"},
{id:11,name:"Backpack",price:1299,cat:"Accessories",img:"https://images.unsplash.com/photo-1502920917128-1aa500764b3e"},
{id:12,name:"Men Hoodie",price:1599,cat:"Men",img:"https://images.unsplash.com/photo-1551028719-00167b16eac5"}
];

let cart=[];

function login(){
if(username.value=="admin" && password.value=="admin"){
loginPage.style.display="none";
storePage.style.display="block";
showProducts(products);
}else alert("Wrong login");
}

function logout(){location.reload();}

function showProducts(list){
let html="";
list.forEach(p=>{
html+=`<div class="col-md-3 mb-4">
<div class="card p-2">
<img src="${p.img}">
<h5>${p.name}</h5>
<p>₹${p.price}</p>
<button class="btn btn-primary btn-sm" onclick="addCart(${p.id})">Add</button>
</div></div>`;
});
document.getElementById("products").innerHTML=html;
}

function filter(cat){
cat=="All"?showProducts(products):showProducts(products.filter(p=>p.cat==cat));
}

search.oninput=()=>{
showProducts(products.filter(p=>p.name.toLowerCase().includes(search.value.toLowerCase())));
};

function addCart(id){
let item=cart.find(x=>x.id==id);
item?item.qty++:cart.push({...products.find(p=>p.id==id),qty:1});
cartCount.innerText=cart.reduce((s,i)=>s+i.qty,0);
}

function openCart(){
let html="",total=0;
cart.forEach(i=>{html+=`<p>${i.name} x ${i.qty}</p>`;total+=i.price*i.qty});
document.getElementById("cartItems").innerHTML=html||"Empty";
document.getElementById("total").innerText=total;
new bootstrap.Modal(cartModal).show();
}

function checkout(){alert("Order placed successfully!");cart=[];cartCount.innerText=0}
function toggleTheme(){document.body.classList.toggle("dark")}

</script>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center mt-5 p-4">
<div class="container">
<h5>FashionStore</h5>
<p>Trendy • Stylish • Affordable</p>
<div class="mb-2">
<a href="#" class="text-white me-3">About</a>
<a href="#" class="text-white me-3">Contact</a>
<a href="#" class="text-white me-3">Privacy</a>
<a href="#" class="text-white">Returns</a>
</div>
<p class="text-muted mb-0">© 2026 FashionStore | Made by Kaushal Raskar</p>
</div>
</footer>

</body>
</html>
